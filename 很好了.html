  <textarea id="input">## Markdown 预览器

欢迎使用！一个简单、美观的 Markdown 实时预览工具。

### 核心功能

| 功能 | 说明 |
|------|------|
| 实时预览 | 左侧写 Markdown，右侧即时渲染 |
| 公式支持 | 行内公式 $E=mc^2$ 和块级公式均可显示 |
| 代码高亮 | 支持 Python、JavaScript、Mermaid 等 |
| 主题切换 | 亮色/暗色模式，跟随系统或手动切换 |
| 导出 HTML | 下载独立文件，可离线查看 |

### 任务列表

### 公式示例

行内公式：$E = mc^2$

块级公式：

$$
\frac{d}{dx} \int_a^x f(t) \, dt = f(x)
$$

graph TD
    A[开始] --> B{判断}

    C --> D
```

<script>
window.md = window.markdownit({html: true, linkify: true, typographer: true});
if (window.markdownitTaskLists) window.md.use(window.markdownitTaskLists);
if (window.markdownitFootnote) window.md.use(window.markdownitFootnote);
if (window.mermaid) window.mermaid.initialize({ startOnLoad: false });

const input = document.getElementById('input');
const preview = document.getElementById('preview');
let isDark = false;

function toggleTheme() {
  isDark = !isDark;
  var btn = document.querySelector('.theme-btn');
  if (isDark) {
    document.body.classList.add('dark');
    document.getElementById('prism-theme').href = 'https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css';
    btn.textContent = '☀️ 亮色';
  } else {
    document.body.classList.remove('dark');
    document.getElementById('prism-theme').href = 'https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css';
    btn.textContent = '🌙 暗色';
  }
}

// 检测系统暗色偏好
if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
  toggleTheme();
}

function render() {
  const text = input.value;
  const formulas = [];

  // 先提取块级公式 $$...$$
  let processed = text.replace(/\$\$([\s\S]*?)\$\$/g, function(match, formula) {
    var idx = formulas.length;
    formulas.push({ formula: formula.trim(), displayMode: true });
    return '%%FORMULA_' + idx + '%%';
  });

  // 再提取行内公式 $...$（不含换行）
  processed = processed.replace(/\$([^$\n]+?)\$/g, function(match, formula) {
    var idx = formulas.length;
    formulas.push({ formula: formula.trim(), displayMode: false });
    return '%%FORMULA_' + idx + '%%';
  });

  // Markdown 解析
  var html = md.render(processed);

  // 替换占位符为渲染后的公式
  for (var i = 0; i < formulas.length; i++) {
    var item = formulas[i];
    var placeholder = '%%FORMULA_' + i + '%%';
    try {
      var rendered = katex.renderToString(item.formula, {
        displayMode: item.displayMode,
        throwOnError: false
      });
      html = html.split(placeholder).join(rendered);
    } catch (e) {
      html = html.split(placeholder).join('<span style="color:red">公式渲染错误</span>');
    }
  }

  preview.innerHTML = html;

  // 宽表格用 .table-wrapper 包裹以实现滑动（窄表格自然显示）
  preview.querySelectorAll('table').forEach(function(table) {
    if (table.parentElement && table.parentElement.classList.contains('table-wrapper')) {
      return;
    }
    // 先让表格按内容自然撑开，测量后再决定是否包裹
    var origDisplay = table.style.display;
    table.style.display = 'table';
    var needsWrap = table.scrollWidth > table.parentElement.clientWidth;
    table.style.display = origDisplay;
    if (needsWrap) {
      var wrapper = document.createElement('div');
      wrapper.className = 'table-wrapper';
      table.parentNode.insertBefore(wrapper, table);
      wrapper.appendChild(table);
    }
  });

  // Mermaid 渲染（将 ```mermaid 代码块转为 SVG 图表）
  if (window.mermaid) {
    preview.querySelectorAll('pre code.language-mermaid').forEach(function(block) {
      var pre = block.parentElement;
      var svgEl = document.createElement('div');
      svgEl.className = 'mermaid';
      svgEl.textContent = block.textContent;
      pre.parentNode.replaceChild(svgEl, pre);
    });
    // 延迟执行，确保 DOM 稳定后再渲染
    setTimeout(function() {
      try {
        mermaid.init(undefined, '.mermaid');
      } catch(e) {
        // Mermaid 渲染失败时静默处理
      }
    }, 50);
  }

  // 代码高亮（Prism.js）— 跳过 mermaid 块
  if (window.Prism) {
    preview.querySelectorAll('pre code').forEach(function(block) {
      if (block.classList.contains('language-mermaid')) return;
      var cls = block.className;
      if (cls && cls.indexOf('language-') !== 0 && cls.indexOf(' ') === -1) {
        block.classList.add('language-' + cls);
      }
      Prism.highlightElement(block);
    });
  }
}

async function exportHTML() {
  var cssTexts = [];
  var cssUrls = [
    'https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css',
    'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css',
    document.getElementById('prism-theme').href
  ];
  for (var i = 0; i < cssUrls.length; i++) {
    try {
      var res = await fetch(cssUrls[i]);
      if (res.ok) {
        cssTexts.push(await res.text());
      }
    } catch (e) {
      // fetch 失败则跳过该 CSS
    }
  }

  // 导出前，对预览内容里超宽的表格添加 .table-wrapper 包裹
  var previewClone = preview.cloneNode(true);
  previewClone.querySelectorAll('table').forEach(function(table) {
    if (table.parentElement && table.parentElement.classList.contains('table-wrapper')) {
      return;
    }
    var origDisplay = table.style.display;
    table.style.display = 'table';
    var needsWrap = table.scrollWidth > table.parentElement.clientWidth;
    table.style.display = origDisplay;
    if (needsWrap) {
      var wrapper = document.createElement('div');
      wrapper.className = 'table-wrapper';
      table.parentNode.insertBefore(wrapper, table);
      wrapper.appendChild(table);
    }
  });
  var exportContent = previewClone.innerHTML;

  // 根据当前主题决定导出样式
  var isExportDark = isDark;

  var html = '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n';
  html += '<meta charset="UTF-8">\n';
  html += '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n';
  html += '<title>导出文档</title>\n';
  html += '<style>\n';
  html += cssTexts.join('\n');
  html += '\n\n';
  html += '.markdown-body .table-wrapper { display: block; overflow-x: scroll; -webkit-overflow-scrolling: touch; width: 100%; margin: 16px 0; border-radius: 6px; border: 1px solid #dfe2e5; }\n';
  html += '.markdown-body .table-wrapper table { display: table; width: max-content; table-layout: auto; border-collapse: collapse; margin: 0; }\n';
  html += '.markdown-body .table-wrapper table th, .markdown-body .table-wrapper table td { padding: 12px 16px; border: 1px solid #dfe2e5; white-space: nowrap; min-width: 80px; }\n';
  html += '.markdown-body strong, .markdown-body b { font-weight: 700 !important; }\n';
  html += '.markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 { font-weight: 700 !important; }\n';
  html += 'body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; padding: 24px; }\n';
  html += '.markdown-body { max-width: 900px; margin: 0 auto; }\n';
  if (isExportDark) {
    html += '.dark, .dark .markdown-body { background: #0d1117 !important; color: #c9d1d9 !important; }\n';
    html += '.dark .markdown-body table { background: #161b22; }\n';
    html += '.dark .markdown-body table th, .dark .markdown-body table td { border-color: #30363d !important; background: #161b22 !important; color: #c9d1d9 !important; }\n';
    html += '.dark .markdown-body table tr:nth-child(2n) { background: #0d1117 !important; }\n';
    html += '.dark .markdown-body blockquote { border-left-color: #30363d !important; color: #8b949e !important; }\n';
    html += '.dark pre { background: #161b22 !important; }\n';
    html += '.dark code { color: #c9d1d9 !important; }\n';
    html += '.dark .markdown-body h1, .dark .markdown-body h2 { border-bottom-color: #30363d !important; }\n';
  } else {
    html += '@media (prefers-color-scheme: dark) {\n';
    html += '  body { background: #0d1117 !important; color: #c9d1d9 !important; }\n';
    html += '  .markdown-body { color: #c9d1d9 !important; }\n';
    html += '  .markdown-body table { background: #161b22; }\n';
    html += '  .markdown-body table th,\n';
    html += '  .markdown-body table td { border-color: #30363d !important; color: #c9d1d9 !important; }\n';
    html += '  .markdown-body blockquote { border-left-color: #30363d !important; color: #8b949e !important; }\n';
    html += '  pre { background: #161b22 !important; }\n';
    html += '  code { color: #c9d1d9 !important; }\n';
    html += '}\n';
  }
  html += '</style>\n';
  html += '</head>\n';
  html += '<body' + (isExportDark ? ' class="dark"' : '') + '>\n';
  html += '<div class="markdown-body">\n';
  html += exportContent;
  html += '\n</div>\n';
  html += '</body>\n</html>';

  var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'document.html';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(link.href);
}

// 防抖输入，避免频繁渲染导致卡顿
var debounceTimer;
input.addEventListener('input', function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 150);
});

render();
</script>
